name: Earn GitHub Achievements
on:
  schedule:
    - cron: '0 * * * *' # Runs at minute 0 of every hour

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Organic Collaboration PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 1. Get a recently active user from GitHub's public events timeline
          echo "Fetching recently active developer..."
          EVENT_DATA=$(gh api /events | jq -c '[.[] | select(.type=="PushEvent")][0]')
          R_LOGIN=$(echo $EVENT_DATA | jq -r '.actor.login')
          R_ID=$(echo $EVENT_DATA | jq -r '.actor.id')
          R_EMAIL="${R_ID}+${R_LOGIN}@users.noreply.github.com"
          
          # 2. Get a random Wikipedia article
          echo "Fetching random Wikipedia content..."
          WIKI_JSON=$(curl -s "https://en.wikipedia.org/api/rest_v1/page/random/summary")
          WIKI_TITLE=$(echo $WIKI_JSON | jq -r '.title')
          WIKI_TEXT=$(echo $WIKI_JSON | jq -r '.extract')
          
          # Clean the title for the filename
          SAFE_TITLE=$(echo "$WIKI_TITLE" | tr -dc '[:alnum:]\n\r' | tr '[:upper:]' '[:lower:]')
          FILE_NAME="wiki_${SAFE_TITLE}.txt"
          
          # Split the text in half
          HALF_LEN=$(( ${#WIKI_TEXT} / 2 ))
          PART_1="${WIKI_TEXT:0:$HALF_LEN}"
          PART_2="${WIKI_TEXT:$HALF_LEN}"
          
          # 3. Create a new branch
          BRANCH="collab-$(date +%s)"
          git checkout -b $BRANCH
          
          # ---------------------------------------------------------
          # COMMIT 1: Authored by the Random User, Co-Authored by YOU
          # ---------------------------------------------------------
          git config --global user.name "$R_LOGIN"
          git config --global user.email "$R_EMAIL"
          
          echo "$PART_1" > "$FILE_NAME"
          git add "$FILE_NAME"
          
          git commit -m "Add first half of $WIKI_TITLE" -m "" -m "Co-authored-by: PUSHPAK-JAISWAL <pushpakmjaiswal@gmail.com>"
          
          # ---------------------------------------------------------
          # COMMIT 2: Authored by YOU, Co-Authored by the Random User
          # ---------------------------------------------------------
          git config --global user.name "PUSHPAK-JAISWAL"
          git config --global user.email "pushpakmjaiswal@gmail.com"
          
          echo "$PART_2" >> "$FILE_NAME"
          git add "$FILE_NAME"
          
          git commit -m "Add second half of $WIKI_TITLE" -m "" -m "Co-authored-by: $R_LOGIN <$R_EMAIL>"
          
          # 4. Push, PR, and Merge
          git push origin $BRANCH
          
          gh pr create --title "Docs: Update info on $WIKI_TITLE" --body "Collaborative Wikipedia update featuring @$R_LOGIN and @PUSHPAK-JAISWAL." --base main --head $BRANCH
          
          gh pr merge --merge --delete-branch

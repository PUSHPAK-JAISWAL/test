name: Earn GitHub Achievements
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "PUSHPAK-JAISWAL"
          git config --global user.email "pushpakmjaiswal@gmail.com"

      - name: Create Co-Authored PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ITERATIONS=48 

          for i in $(seq 1 $ITERATIONS)
          do
            BRANCH="pair-run-$i-$(date +%u%H%M%S)"
            git checkout -b $BRANCH
            
            echo "Pairing milestone $i" >> achievement_log.txt
            git add achievement_log.txt
            
            # Using multiple -m flags safely formats the message without breaking YAML
            git commit -m "Collaboration task $i" -m "" -m "Co-authored-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
            
            git push origin $BRANCH
            
            gh pr create --title "Pairing Achievement PR $i" --body "Automated pairing for badges" --base main --head $BRANCH
            
            gh pr merge --merge --delete-branch
            
            git checkout main
            git pull origin main
            
            sleep 2
          done

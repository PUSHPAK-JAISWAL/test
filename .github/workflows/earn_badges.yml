name: Earn GitHub Achievements
on:
  workflow_dispatch: # Keep this so you can test it manually
  schedule:
    - cron: '0 * * * *' # This tells GitHub to run it at minute 0 of every hour

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "PUSHPAK-JAISWAL"
          git config --global user.email "pushpakmjaiswal@gmail.com"

      - name: Create Co-Authored PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 1. Fetch a random user from GitHub's API
          # We pick a random ID between 1 and 50,000,000 to ensure we hit an active account
          RAND_ID=$((1 + $RANDOM % 50000000))
          USER_DATA=$(gh api /users?since=$RAND_ID | jq -c '.[0]')
          
          # 2. Extract their exact username and ID
          COAUTHOR_NAME=$(echo $USER_DATA | jq -r '.login')
          COAUTHOR_ID=$(echo $USER_DATA | jq -r '.id')
          
          # 3. Construct the official GitHub no-reply email format for that specific user
          COAUTHOR_EMAIL="${COAUTHOR_ID}+${COAUTHOR_NAME}@users.noreply.github.com"
          
          echo "Pairing with random user: $COAUTHOR_NAME"
          
          # 4. Create the branch and commit
          BRANCH="pair-cron-$(date +%s)"
          git checkout -b $BRANCH
          
          echo "Cron pairing milestone $(date)" >> achievement_log.txt
          git add achievement_log.txt
          
          # Safely apply the random user as the Co-author
          git commit -m "Hourly collaboration task" -m "" -m "Co-authored-by: $COAUTHOR_NAME <$COAUTHOR_EMAIL>"
          
          git push origin $BRANCH
          
          # 5. Create and Merge the PR
          gh pr create --title "Pairing Achievement PR ($COAUTHOR_NAME)" --body "Automated pairing via Cron" --base main --head $BRANCH
          gh pr merge --merge --delete-branch
